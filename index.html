<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Rare Opportunity for Escapism</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 35%),
        linear-gradient(135deg, #0f172a, #312e81, #111827);
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .container {
      max-width: 900px;
      padding: 56px 48px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.58);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 5rem);
      line-height: 1.08;
      margin: 0 0 28px;
      font-weight: normal;
      letter-spacing: -0.04em;
    }

    p {
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      line-height: 1.7;
      margin: 0;
      color: #e0e7ff;
    }

    .button {
      display: inline-block;
      margin-top: 40px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #f8fafc;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.08);
      transition: all 0.25s ease;
    }

    .button:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>A rare opportunity for escapism</h1>

    <p>
      I welcome you, my dear stranger, into a time and place devoid of evil
      reality and safe from melancholic affairs. A rare opportunity for
      escapism presents itself; will you grasp it?
    </p>

    <a class="button" href="#">Enter</a>
  </main>
</body>
</html>
