<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 Ava's Caterpillar Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background: linear-gradient(180deg, #87ceeb 0%, #d4f0b0 55%, #5aad3f 55%, #3d8a28 100%);
    transition: background 5s ease;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden; touch-action: none;
  }

  .cloud {
    position: absolute; z-index: 0;
    border-radius: 50px;
    pointer-events: none;
    transition: background 4s ease;
  }
  .cloud::before, .cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
  .cloud-1 { width:90px; height:30px; top:4%;  left:-100px; background:rgba(255,255,255,0.75); animation:drift 26s linear infinite; }
  .cloud-1::before { width:44px; height:44px; top:-20px; left:14px; }
  .cloud-1::after  { width:32px; height:32px; top:-14px; left:42px; }
  .cloud-2 { width:65px; height:23px; top:12%; left:-80px;  background:rgba(255,255,255,0.6);  animation:drift 36s linear 10s infinite; }
  .cloud-2::before { width:30px; height:30px; top:-14px; left:10px; }
  .cloud-2::after  { width:24px; height:24px; top:-11px; left:30px; }
  .cloud-3 { width:110px; height:36px; top:2%; left:-120px; background:rgba(255,255,255,0.5); animation:drift 44s linear 6s infinite; }
  .cloud-3::before { width:54px; height:54px; top:-24px; left:18px; }
  .cloud-3::after  { width:38px; height:38px; top:-18px; left:56px; }
  @keyframes drift { from{transform:translateX(0)} to{transform:translateX(calc(100vw + 150px))} }

  #wrap {
    position: relative; z-index: 1;
    display:flex; flex-direction:column; align-items:center;
    width:100%; max-width:460px;
    padding:6px 8px 4px; gap:6px;
  }

  #hud {
    width:100%; display:flex; align-items:center;
    justify-content:space-between;
    background:rgba(255,255,255,0.22); backdrop-filter:blur(12px);
    border:1.5px solid rgba(255,255,255,0.45);
    border-radius:20px; padding:4px 12px;
  }
  #score-label { font-family:'Baloo 2',cursive; font-size:15px; color:#1e4d08; min-width:50px; }
  #pips { display:flex; gap:4px; align-items:center; flex-wrap:wrap; justify-content:center; max-width:150px; }
  .pip {
    width:12px; height:12px;
    background:rgba(255,255,255,0.3);
    border-radius:50% 0 50% 0; transform:rotate(45deg);
    border:1.5px solid rgba(100,200,100,0.35);
    transition:background .25s, box-shadow .25s;
  }
  .pip.mini { width:9px; height:9px; }
  .pip.on { background:#4dbe52; border-color:#2e8b35; box-shadow:0 0 5px rgba(77,190,82,0.75); }
  #mode-badge {
    font-family:'Baloo 2',cursive; font-size:12px;
    color:#1e4d08; text-align:right; min-width:48px;
    display:flex; flex-direction:column; align-items:flex-end; line-height:1.2;
  }
  #mode-icon  { font-size:17px; }
  #level-text { font-size:10px; color:#2e6b0e; font-weight:700; }
  #weather-icon { font-size:15px; margin-left:3px; }

  #frame {
    position:relative; border-radius:16px; overflow:hidden;
    box-shadow:0 2px 0 rgba(255,255,255,0.6) inset,
               0 10px 32px rgba(0,0,0,0.22), 0 0 0 3px rgba(255,255,255,0.3);
  }
  canvas { display:block; }

  .overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(12,50,5,0.78); backdrop-filter:blur(6px);
    gap:4px; padding:16px;
  }
  .overlay .ov-emoji { font-size:52px; margin-bottom:2px; }
  .overlay h1 {
    font-family:'Baloo 2',cursive; font-size:24px; font-weight:800;
    color:#fffde7; text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,0.4); line-height:1.1;
  }
  .overlay .sub { font-family:'Baloo 2',cursive; color:#ffe57f; font-size:14px; margin:1px 0 4px; text-align:center; }
  .overlay p { color:rgba(255,255,255,0.8); font-size:12px; text-align:center; line-height:1.5; }
  .btn {
    background:linear-gradient(160deg,#7cca44,#52a020);
    color:white; font-family:'Baloo 2',cursive; font-size:18px;
    border:none; padding:10px 36px; border-radius:50px; cursor:pointer;
    box-shadow:0 4px 0 #2e6b0e, 0 5px 14px rgba(0,0,0,0.25);
    transition:transform .08s, box-shadow .08s; margin-top:4px;
  }
  .btn:active { transform:translateY(3px); box-shadow:0 1px 0 #2e6b0e, 0 2px 6px rgba(0,0,0,.2); }

  #xform {
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:8px; pointer-events:none;
  }
  #xform.show { display:flex; animation:xbg 2.4s ease forwards; }
  @keyframes xbg {
    0%   { background:rgba(255,220,50,0); }
    20%  { background:rgba(255,220,50,0.55); }
    80%  { background:rgba(255,220,50,0.4); }
    100% { background:rgba(255,220,50,0); }
  }
  #xform-emoji {
    font-size:72px; display:block;
    animation:spinpop 1.8s ease-out forwards;
    filter:drop-shadow(0 0 22px rgba(255,210,0,0.95));
  }
  @keyframes spinpop {
    0%   { transform:scale(0.1) rotate(-200deg); opacity:0; }
    50%  { transform:scale(1.45) rotate(15deg); opacity:1; }
    70%  { transform:scale(0.88) rotate(-6deg); }
    85%  { transform:scale(1.12) rotate(3deg); }
    100% { transform:scale(1) rotate(0deg); }
  }
  #xform-label {
    font-family:'Baloo 2',cursive; font-size:24px; color:white;
    text-shadow:0 0 18px rgba(255,210,50,1), 0 2px 6px rgba(0,0,0,0.4);
    animation:lpulse .5s ease-in-out infinite alternate;
  }
  #xform-sub {
    font-family:'Baloo 2',cursive; font-size:15px;
    color:rgba(255,255,200,0.92);
    text-shadow:0 1px 6px rgba(0,0,0,0.4);
  }
  @keyframes lpulse { from{transform:scale(.96)} to{transform:scale(1.04)} }

  #dpad {
    display:grid; grid-template-columns:repeat(3,48px);
    grid-template-rows:repeat(2,48px); gap:4px;
  }
  .dpbtn {
    background:rgba(255,255,255,0.18); backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,0.35); border-radius:12px;
    color:rgba(255,255,255,0.92); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    user-select:none; transition:background .1s, transform .08s;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
  }
  .dpbtn:active { background:rgba(255,255,255,0.4); transform:scale(0.91); }
  #bu{grid-column:2;grid-row:1} #bl{grid-column:1;grid-row:2}
  #bd{grid-column:2;grid-row:2} #br{grid-column:3;grid-row:2}
</style>
</head>
<body>
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div id="wrap">
  <div id="hud">
    <div id="score-label">🍃 <span id="score">0</span></div>
    <div id="pips"></div>
    <div id="mode-badge">
      <span id="mode-icon">🐛</span>
      <span id="level-text"></span>
    </div>
    <span id="weather-icon">☀️</span>
  </div>

  <div id="frame">
    <canvas id="c"></canvas>

    <div class="overlay" id="ov-start">
      <div class="ov-emoji">🌸</div>
      <h1>Ava's Caterpillar Garden</h1>
      <p class="sub">Eat 5 leaves → become a 🦋<br>Every 10 leaves → level up!</p>
      <p>Arrow keys, WASD, swipe,<br>or use the buttons below</p>
      <button class="btn" id="startBtn">Play!</button>
    </div>

    <div class="overlay" id="ov-dead" style="display:none">
      <div class="ov-emoji" id="dead-emoji">😵</div>
      <h1 id="dead-title">Game Over!</h1>
      <div class="sub">🍃 <span id="dead-score">0</span> leaves eaten</div>
      <p id="dead-msg"></p>
      <button class="btn" id="restartBtn">Try Again!</button>
    </div>

    <div id="xform">
      <span id="xform-emoji">🦋</span>
      <div id="xform-label">You're a Butterfly!</div>
      <div id="xform-sub">Level 1 — Monarch</div>
    </div>
  </div>

  <div id="dpad">
    <button class="dpbtn" id="bu">▲</button>
    <button class="dpbtn" id="bl">◀</button>
    <button class="dpbtn" id="bd">▼</button>
    <button class="dpbtn" id="br">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const frame  = document.getElementById('frame');
const GRID   = 20;
let CELL     = 20;

function sizeCanvas() {
  const avW = window.innerWidth  - 20;
  const avH = window.innerHeight - 160;
  const sz  = Math.max(Math.min(avW, avH, 420), 240);
  CELL = Math.floor(sz / GRID);
  canvas.width  = CELL * GRID;
  canvas.height = CELL * GRID;
  frame.style.width  = canvas.width  + 'px';
  frame.style.height = canvas.height + 'px';
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

// ── Butterfly palettes ──
const BFLY = [
  null,
  { name:'Monarch',    u1:[255,145,0],  u2:[210,70,0],   l1:[255,190,0],  l2:[185,95,0],   body:'#3e2723', glow:'rgba(255,165,0,0.8)'   },
  { name:'Morpho',     u1:[20,140,255], u2:[0,70,210],   l1:[100,210,255],l2:[0,90,190],   body:'#0d1b4b', glow:'rgba(30,160,255,0.8)'  },
  { name:'Swallowtail',u1:[200,50,230], u2:[140,0,185],  l1:[255,160,230],l2:[170,0,145],  body:'#2d0040', glow:'rgba(200,80,240,0.8)'  },
  { name:'Emerald',    u1:[0,195,100],  u2:[0,130,55],   l1:[120,255,160],l2:[0,110,55],   body:'#0d2b1a', glow:'rgba(0,210,110,0.8)'   },
  { name:'Crimson',    u1:[230,30,30],  u2:[170,0,0],    l1:[255,130,130],l2:[195,45,45],  body:'#2d0000', glow:'rgba(240,50,50,0.8)'   },
  { name:'Celestial',  u1:[180,120,255],u2:[100,0,220],  l1:[230,200,255],l2:[130,60,200], body:'#16003a', glow:'rgba(180,130,255,0.8)' },
];
function getPalette(lvl){ return BFLY[Math.min(lvl, BFLY.length-1)] || BFLY[1]; }

// ── Flowers ──
const FLOWER_DEFS = [
  {gx:1, gy:1,  type:'sunflower'}, {gx:6,  gy:0,  type:'rose'},
  {gx:13,gy:1,  type:'tulip'},     {gx:18, gy:4,  type:'daisy'},
  {gx:19,gy:12, type:'lavender'},  {gx:15, gy:18, type:'sunflower'},
  {gx:8, gy:19, type:'rose'},      {gx:2,  gy:17, type:'daisy'},
  {gx:0, gy:10, type:'tulip'},     {gx:4,  gy:6,  type:'lavender'},
  {gx:17,gy:9,  type:'rose'},      {gx:11, gy:14, type:'sunflower'},
  {gx:7, gy:13, type:'daisy'},     {gx:15, gy:5,  type:'tulip'},
];

// ── Weather ──
const WEATHERS = ['sunny','cloudy','rainy'];
const W_DUR    = { sunny:20000, cloudy:13000, rainy:15000 };
const W_ICONS  = { sunny:'☀️', cloudy:'🌥️', rainy:'🌧️' };
const W_BG = {
  sunny:  'linear-gradient(180deg,#87ceeb 0%,#d4f0b0 55%,#5aad3f 55%,#3d8a28 100%)',
  cloudy: 'linear-gradient(180deg,#9bb8d4 0%,#c0d8a0 55%,#4a9028 55%,#2f6b18 100%)',
  rainy:  'linear-gradient(180deg,#6b8ca4 0%,#8aaa78 55%,#387018 55%,#1e5008 100%)',
};
const W_CLOUD = {
  sunny:'rgba(255,255,255,0.72)', cloudy:'rgba(190,200,215,0.85)', rainy:'rgba(140,155,175,0.9)'
};
let weatherState = 'sunny', weatherChanged = Date.now(), raindrops = [];

function updateWeather() {
  if (Date.now() - weatherChanged >= W_DUR[weatherState]) {
    const i = WEATHERS.indexOf(weatherState);
    weatherState = WEATHERS[(i+1) % WEATHERS.length];
    weatherChanged = Date.now();
    document.body.style.background = W_BG[weatherState];
    document.getElementById('weather-icon').textContent = W_ICONS[weatherState];
    document.querySelectorAll('.cloud').forEach(c => c.style.background = W_CLOUD[weatherState]);
  }
  if (weatherState === 'rainy') {
    if (raindrops.length < 65 && Math.random() < 0.42)
      raindrops.push({ x:Math.random()*canvas.width+10, y:-12,
        spd:4.5+Math.random()*4, len:7+Math.random()*9, alpha:0.28+Math.random()*0.22 });
    raindrops.forEach(r => { r.y += r.spd; r.x -= 0.7; });
    raindrops = raindrops.filter(r => r.y < canvas.height+20);
  } else { raindrops = []; }
}

// ── State ──
let snake, dir, nextDir, food, score, levelLeaves, isButterfly, butterflyLevel, state, particles, tick;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; levelLeaves = 0; isButterfly = false; butterflyLevel = 0;
  state = 'playing'; particles = [];
  spawnFood(); rebuildPips(); updateHUD();
}

function spawnFood() {
  let p;
  do { p = {x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID)}; }
  while (snake.some(s => s.x===p.x && s.y===p.y));
  food = p;
}

function rebuildPips() {
  const c = document.getElementById('pips');
  c.innerHTML = '';
  const n = isButterfly ? 10 : 5;
  for (let i=0;i<n;i++) {
    const d = document.createElement('div');
    d.className='pip'+(isButterfly?' mini':''); d.id='pp'+i;
    c.appendChild(d);
  }
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('mode-icon').textContent = isButterfly ? '🦋' : '🐛';
  document.getElementById('level-text').textContent = isButterfly ? `Lvl ${butterflyLevel}` : '';
  const t = isButterfly ? 10 : 5;
  for (let i=0;i<t;i++) { const el=document.getElementById('pp'+i); if(el) el.classList.toggle('on', i<levelLeaves); }
}

// ── Tick ──
function step() {
  if (state!=='playing') return;
  dir = {...nextDir};
  const h = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (h.x<0||h.x>=GRID||h.y<0||h.y>=GRID||snake.some(s=>s.x===h.x&&s.y===h.y)) { die(); return; }
  snake.unshift(h);
  if (h.x===food.x && h.y===food.y) {
    score++; levelLeaves++;
    burst(food.x*CELL+CELL/2, food.y*CELL+CELL/2);
    const target = isButterfly ? 10 : 5;
    if (levelLeaves >= target) {
      levelLeaves = 0;
      if (!isButterfly) doTransform(); else doLevelUp();
    } else { spawnFood(); updateHUD(); }
  } else { snake.pop(); }
}

function doTransform() {
  butterflyLevel=1; state='xforming'; clearInterval(tick);
  const p=getPalette(1);
  document.getElementById('xform-label').textContent="You're a Butterfly!";
  document.getElementById('xform-sub').textContent=`Level 1 — ${p.name} 🦋`;
  const xf=document.getElementById('xform'); xf.classList.add('show');
  setTimeout(()=>{ xf.classList.remove('show'); isButterfly=true; spawnFood(); rebuildPips(); updateHUD(); state='playing'; startTick(); },2500);
}

function doLevelUp() {
  butterflyLevel++; state='xforming'; clearInterval(tick);
  const p=getPalette(butterflyLevel);
  document.getElementById('xform-label').textContent=`Level ${butterflyLevel}!`;
  document.getElementById('xform-sub').textContent=`${p.name} Butterfly 🦋`;
  const xf=document.getElementById('xform'); xf.classList.add('show');
  setTimeout(()=>{ xf.classList.remove('show'); spawnFood(); updateHUD(); state='playing'; startTick(); },2200);
}

function die() {
  clearInterval(tick); state='dead';
  const rem=(isButterfly?10:5)-levelLeaves;
  document.getElementById('dead-emoji').textContent=isButterfly?'🦋':'😵';
  document.getElementById('dead-title').textContent=isButterfly?'What a flight!':'Oh no!';
  document.getElementById('dead-score').textContent=score;
  document.getElementById('dead-msg').textContent=isButterfly?`Level ${butterflyLevel} butterfly — so graceful!`
    :levelLeaves>0?`Only ${rem} more leaf${rem!==1?'ves':''} to fly!`:'Munch some leaves!';
  document.getElementById('ov-dead').style.display='flex';
}

function startTick() {
  const spd = Math.max((isButterfly?115:155)-(butterflyLevel-1)*7, 75);
  tick = setInterval(step, spd);
}

// ── Particles ──
function burst(x,y) {
  const cols=isButterfly?(()=>{const p=getPalette(butterflyLevel);return[`rgb(${p.u1})`,`rgb(${p.l1})`,`rgb(${p.u2})`,'#fff','#ffe57f'];})()
    :['#7cca44','#ffd700','#ff9f43','#55efc4','#fd79a8'];
  for(let i=0;i<14;i++){
    const a=(Math.PI*2/14)*i+Math.random()*0.3, spd=2.5+Math.random()*3.8;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.2,life:1,
      color:cols[Math.floor(Math.random()*cols.length)],size:3+Math.random()*4.5,rot:Math.random()*Math.PI*2});
  }
}
function tickParticles() {
  particles=particles.filter(p=>p.life>0.02);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.life-=0.043;p.rot+=0.16;});
}

// ── Background ──
function drawBg() {
  updateWeather();
  const g=ctx.createLinearGradient(0,0,canvas.width,0);
  g.addColorStop(0,'#1c6b10'); g.addColorStop(0.25,'#2e8c20');
  g.addColorStop(0.55,'#52aa38'); g.addColorStop(0.80,'#8ccc55'); g.addColorStop(1,'#c8f085');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(weatherState==='cloudy'){ctx.fillStyle='rgba(120,135,150,0.14)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  else if(weatherState==='rainy'){ctx.fillStyle='rgba(60,80,100,0.22)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  ctx.fillStyle='rgba(100,160,60,0.13)';
  for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++){ctx.beginPath();ctx.arc(x*CELL+CELL/2,y*CELL+CELL/2,1,0,Math.PI*2);ctx.fill();}
  FLOWER_DEFS.forEach(f=>drawFlower(f.type,f.gx*CELL+CELL/2,f.gy*CELL+CELL/2,CELL*0.28));
  if(weatherState==='rainy'){
    raindrops.forEach(r=>{
      ctx.save();ctx.globalAlpha=r.alpha;ctx.strokeStyle='#a8d8f0';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-2,r.y-r.len);ctx.stroke();ctx.restore();
    });
  }
}

// ── Flowers ──
function drawFlower(type,cx,cy,r) {
  ctx.save(); ctx.translate(cx,cy);
  ctx.strokeStyle='#3a7820'; ctx.lineWidth=1.1;
  ctx.beginPath(); ctx.moveTo(0,r*0.45); ctx.quadraticCurveTo(r*0.15,r*1.1,0,r*1.6); ctx.stroke();
  switch(type){
    case 'sunflower':
      for(let i=0;i<12;i++){ctx.save();ctx.rotate((Math.PI*2/12)*i);ctx.fillStyle='#f9ca24';ctx.beginPath();ctx.ellipse(0,-r*0.92,r*0.22,r*0.46,0,0,Math.PI*2);ctx.fill();ctx.restore();}
      ctx.fillStyle='#6d3a10';ctx.beginPath();ctx.arc(0,0,r*0.42,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4a2208';ctx.beginPath();ctx.arc(0,0,r*0.27,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,200,80,0.28)';ctx.beginPath();ctx.arc(-r*0.1,-r*0.1,r*0.1,0,Math.PI*2);ctx.fill();
      break;
    case 'rose':
      ctx.fillStyle='#c0392b';
      [0,1.26,2.51,3.77,5.03].forEach(a=>{ctx.beginPath();ctx.ellipse(Math.cos(a)*r*0.33,Math.sin(a)*r*0.33,r*0.36,r*0.54,a,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#e74c3c';
      [0,1.57,3.14,4.71].forEach(a=>{ctx.beginPath();ctx.ellipse(Math.cos(a)*r*0.17,Math.sin(a)*r*0.17,r*0.24,r*0.34,a,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#ff6b6b';ctx.beginPath();ctx.arc(0,-r*0.05,r*0.19,0,Math.PI*2);ctx.fill();
      break;
    case 'tulip':
      ctx.fillStyle='#c0392b';
      ctx.beginPath();ctx.ellipse(-r*0.52,-r*0.5,r*0.28,r*0.5,-0.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse( r*0.52,-r*0.5,r*0.28,r*0.5, 0.4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.ellipse(0,-r*0.68,r*0.3,r*0.56,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,160,160,0.3)';ctx.beginPath();ctx.ellipse(-r*0.08,-r*0.86,r*0.09,r*0.2,-0.15,0,Math.PI*2);ctx.fill();
      break;
    case 'daisy':
      for(let i=0;i<10;i++){ctx.save();ctx.rotate((Math.PI*2/10)*i);ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();ctx.ellipse(0,-r*0.77,r*0.16,r*0.36,0,0,Math.PI*2);ctx.fill();ctx.restore();}
      ctx.fillStyle='#f9ca24';ctx.beginPath();ctx.arc(0,0,r*0.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#f0932b';ctx.beginPath();ctx.arc(0,0,r*0.18,0,Math.PI*2);ctx.fill();
      break;
    case 'lavender':
      const lc=['#8e44ad','#9b59b6','#a569bd','#7d3c98'];
      for(let i=0;i<7;i++){const yo=-r*0.2-i*r*0.23,xo=(i%2===0?1:-1)*r*0.18;ctx.fillStyle=lc[i%4];ctx.beginPath();ctx.ellipse(xo,yo,r*0.12,r*0.19,xo<0?0.3:-0.3,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#6c3483';ctx.beginPath();ctx.ellipse(0,-r*1.95,r*0.09,r*0.17,0,0,Math.PI*2);ctx.fill();
      break;
  }
  ctx.restore();
}

// ── Leaf ──
function drawLeaf(gx,gy) {
  const t=Date.now(), x=gx*CELL+CELL/2, y=gy*CELL+CELL/2, r=CELL*0.34, bob=Math.sin(t/580)*1.4;
  ctx.save(); ctx.translate(x,y+bob); ctx.rotate(Math.sin(t/880)*0.16);
  ctx.fillStyle='rgba(0,70,0,0.1)';ctx.beginPath();ctx.ellipse(2.5,r*0.62,r*0.66,r*0.16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2ea040';ctx.beginPath();ctx.moveTo(0,-r);ctx.bezierCurveTo(r*1.1,-r*0.6,r*1.1,r*0.6,0,r);ctx.bezierCurveTo(-r*1.1,r*0.6,-r*1.1,-r*0.6,0,-r);ctx.fill();
  ctx.fillStyle='rgba(120,230,120,0.3)';ctx.beginPath();ctx.moveTo(0,-r);ctx.bezierCurveTo(r*1.1,-r*0.6,r*1.1,r*0.6,0,r);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(30,130,50,0.65)';ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(0,-r*0.84);ctx.lineTo(0,r*0.84);ctx.stroke();
  ctx.lineWidth=0.65;ctx.strokeStyle='rgba(60,170,70,0.48)';
  [-0.5,-0.18,0.12,0.42].forEach(yf=>{ctx.beginPath();ctx.moveTo(0,yf*r);ctx.lineTo(r*0.52,yf*r-r*0.16);ctx.stroke();ctx.beginPath();ctx.moveTo(0,yf*r);ctx.lineTo(-r*0.52,yf*r-r*0.16);ctx.stroke();});
  ctx.restore();
}

// ── Particles draw ──
function drawParticles() {
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;
    ctx.beginPath();for(let i=0;i<4;i++){const a=(Math.PI/2)*i;ctx.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);ctx.lineTo(Math.cos(a+Math.PI/4)*p.size*0.38,Math.sin(a+Math.PI/4)*p.size*0.38);}
    ctx.closePath();ctx.fill();ctx.restore();
  });
}

// ── Caterpillar ──
function drawCaterpillar() {
  const sc=['#85cc3e','#9ddc50','#6db52e','#aae060'];
  for(let i=snake.length-1;i>=1;i--){
    const s=snake[i], sx=s.x*CELL+CELL/2, sy=s.y*CELL+CELL/2;
    const r=Math.max(CELL*(0.34-i*0.003),CELL*0.15), col=sc[i%sc.length];
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.27)';ctx.beginPath();ctx.arc(sx-r*0.22,sy-r*0.25,r*0.31,0,Math.PI*2);ctx.fill();
    if(i%2===0&&i<snake.length-1){
      ctx.strokeStyle='#4a8a1a';ctx.lineWidth=1.4;const leg=CELL*0.2;
      ctx.beginPath();ctx.moveTo(sx-r*0.55,sy+r*0.1);ctx.quadraticCurveTo(sx-r*0.6-leg*0.4,sy+leg,sx-r*0.4-leg,sy+leg*0.8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+r*0.55,sy+r*0.1);ctx.quadraticCurveTo(sx+r*0.6+leg*0.4,sy+leg,sx+r*0.4+leg,sy+leg*0.8);ctx.stroke();
    }
  }
  const h=snake[0], hx=h.x*CELL+CELL/2, hy=h.y*CELL+CELL/2, hr=CELL*0.40;
  ctx.fillStyle='#4a8a1a';ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5da820';ctx.beginPath();ctx.arc(hx,hy,hr*0.82,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.arc(hx-hr*0.2,hy-hr*0.25,hr*0.32,0,Math.PI*2);ctx.fill();
  const ba=Math.atan2(dir.y,dir.x);
  ctx.strokeStyle='#2e5c0a';ctx.lineWidth=1.6;
  [-0.5,0.5].forEach(off=>{const a=ba+off,tip={x:hx+Math.cos(a)*hr*1.05,y:hy+Math.sin(a)*hr*1.05};ctx.beginPath();ctx.moveTo(hx+Math.cos(a)*hr*0.5,hy+Math.sin(a)*hr*0.5);ctx.lineTo(tip.x,tip.y);ctx.stroke();ctx.fillStyle='#2e5c0a';ctx.beginPath();ctx.arc(tip.x,tip.y,2.8,0,Math.PI*2);ctx.fill();});
  [-0.38,0.38].forEach(off=>{const a=ba+off,ex=hx+Math.cos(a)*hr*0.52,ey=hy+Math.sin(a)*hr*0.52;ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex,ey,4.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(ex+Math.cos(ba),ey+Math.sin(ba),2.8,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex+Math.cos(ba)*1.5-0.8,ey+Math.sin(ba)*1.5-0.8,1,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='rgba(20,80,0,0.7)';ctx.lineWidth=1.2;const sa=ba+Math.PI/2;ctx.beginPath();ctx.arc(hx+Math.cos(ba)*hr*0.18,hy+Math.sin(ba)*hr*0.18,hr*0.28,sa-0.6,sa+0.6);ctx.stroke();
}

// ── Butterfly ──
function drawButterfly() {
  const t=Date.now(), flap=Math.sin(t/155)*0.5, lvl=Math.max(butterflyLevel,1), pal=getPalette(lvl);
  const ws=CELL*(0.68+Math.min(lvl,6)*0.10), glowR=ws*1.6+(lvl-1)*CELL*0.15;
  for(let i=snake.length-1;i>=1;i--){const s=snake[i],sx=s.x*CELL+CELL/2,sy=s.y*CELL+CELL/2,r=Math.max(CELL*0.1*(1-i/snake.length*0.7),2.5);ctx.globalAlpha=Math.max(0.7-i/snake.length*0.5,0.05);ctx.fillStyle=pal.body;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  const h=snake[0],hx=h.x*CELL+CELL/2,hy=h.y*CELL+CELL/2;
  const grd=ctx.createRadialGradient(hx,hy,0,hx,hy,glowR);grd.addColorStop(0,pal.glow.replace('0.8','0.2'));grd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(hx,hy,glowR,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(hx,hy);ctx.rotate(Math.atan2(dir.y,dir.x)-Math.PI/2);
  for(const side of[-1,1]){
    ctx.save();ctx.scale(side,1);
    ctx.save();ctx.rotate(-flap);ctx.beginPath();
    const ug=ctx.createRadialGradient(ws*0.4,-ws*0.28,0,ws*0.4,-ws*0.28,ws*1.1);
    ug.addColorStop(0,`rgba(${pal.u1},0.94)`);ug.addColorStop(0.55,`rgba(${pal.u2},0.88)`);ug.addColorStop(1,`rgba(${pal.u2.map(v=>Math.max(0,v-40))},0.75)`);
    ctx.fillStyle=ug;ctx.moveTo(0,0);ctx.bezierCurveTo(-ws*0.28,-ws*1.32,ws*1.32,-ws*1.0,ws*1.12,ws*0.05);ctx.bezierCurveTo(ws*0.9,ws*0.42,ws*0.2,ws*0.2,0,0);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=0.7;ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.6;
    [[ws*0.42,-ws*0.52,ws*0.9,-ws*0.48],[ws*0.32,-ws*0.3,ws*0.82,ws*0.02]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(x1,y1,x2,y2,x2,y2);ctx.stroke();});
    [[ws*0.62,-ws*0.6,4.5,'rgba(255,255,255,0.55)'],[ws*0.35,-ws*0.9,3,'rgba(0,0,0,0.4)'],[ws*0.78,-ws*0.24,2.8,'rgba(0,0,0,0.3)']].forEach(([dx,dy,sr,sc])=>{ctx.fillStyle=sc;ctx.beginPath();ctx.arc(dx,dy,sr*(0.8+lvl*0.08),0,Math.PI*2);ctx.fill();});
    if(lvl>=3){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(ws*0.5,-ws*0.4,2.5,0,Math.PI*2);ctx.fill();}
    ctx.restore();
    ctx.save();ctx.rotate(flap*0.5);ctx.beginPath();
    const lg=ctx.createRadialGradient(ws*0.3,ws*0.5,0,ws*0.3,ws*0.5,ws*0.9);
    lg.addColorStop(0,`rgba(${pal.l1},0.9)`);lg.addColorStop(0.6,`rgba(${pal.l2},0.82)`);lg.addColorStop(1,`rgba(${pal.l2.map(v=>Math.max(0,v-30))},0.65)`);
    ctx.fillStyle=lg;ctx.moveTo(0,0);ctx.bezierCurveTo(ws*0.22,ws*0.38,ws*1.0,ws*0.92,ws*0.72,ws*0.97);ctx.bezierCurveTo(ws*0.42,ws*1.02,ws*0.1,ws*0.72,0,0);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=0.7;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.42)';ctx.beginPath();ctx.arc(ws*0.45,ws*0.65,3.2*(0.8+lvl*0.08),0,Math.PI*2);ctx.fill();
    if(lvl>=2){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(ws*0.22,ws*0.82,2.2,0,Math.PI*2);ctx.fill();}
    ctx.restore();ctx.restore();
  }
  ctx.fillStyle=pal.body;ctx.beginPath();ctx.ellipse(0,0,CELL*0.13,CELL*(0.36+lvl*0.02),0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.ellipse(-CELL*0.04,-CELL*0.1,CELL*0.04,CELL*0.12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=pal.body;ctx.beginPath();ctx.arc(0,-CELL*0.32,CELL*0.16,0,Math.PI*2);ctx.fill();
  [[-2.5,-CELL*0.35],[2.5,-CELL*0.35]].forEach(([ex,ey])=>{ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(ex,ey,1.8,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle=pal.body;ctx.lineWidth=1.2;
  [[-2.5,-0.6],[2.5,0.6]].forEach(([ax,ar])=>{const tx=ax+Math.cos(ar)*CELL*0.42,ty=-CELL*0.52+Math.sin(ar)*CELL*0.3;ctx.beginPath();ctx.moveTo(ax,-CELL*0.4);ctx.quadraticCurveTo(ax+Math.cos(ar)*CELL*0.22,-CELL*0.52,tx,ty);ctx.stroke();ctx.fillStyle=pal.body;ctx.beginPath();ctx.arc(tx,ty,2.2,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

// ── Render ──
function render() {
  drawBg(); drawLeaf(food.x,food.y); tickParticles(); drawParticles();
  if(isButterfly) drawButterfly(); else drawCaterpillar();
  requestAnimationFrame(render);
}

// ── Controls ──
function move(dx,dy){ if(state!=='playing') return; if(dx===-dir.x&&dy===-dir.y) return; nextDir={x:dx,y:dy}; }
document.addEventListener('keydown',e=>{
  if(['ArrowUp','w','W'].includes(e.key)){move(0,-1);e.preventDefault();}
  else if(['ArrowDown','s','S'].includes(e.key)){move(0,1);e.preventDefault();}
  else if(['ArrowLeft','a','A'].includes(e.key)){move(-1,0);e.preventDefault();}
  else if(['ArrowRight','d','D'].includes(e.key)){move(1,0);e.preventDefault();}
});
[['bu',0,-1],['bd',0,1],['bl',-1,0],['br',1,0]].forEach(([id,dx,dy])=>{
  const b=document.getElementById(id);
  b.addEventListener('touchstart',e=>{move(dx,dy);e.preventDefault();},{passive:false});
  b.addEventListener('mousedown',()=>move(dx,dy));
});
let ts=null;
canvas.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{if(!ts)return;const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1,0);else move(0,dy>0?1:-1);ts=null;e.preventDefault();},{passive:false});

document.getElementById('startBtn').addEventListener('click',()=>{document.getElementById('ov-start').style.display='none';init();startTick();});
document.getElementById('restartBtn').addEventListener('click',()=>{document.getElementById('ov-dead').style.display='none';clearInterval(tick);init();startTick();});

// Bootstrap
sizeCanvas();
snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}];dir={x:1,y:0};food={x:14,y:10};
isButterfly=false;butterflyLevel=0;particles=[];levelLeaves=0;state='idle';
rebuildPips();
document.body.style.background=W_BG['sunny'];
document.querySelectorAll('.cloud').forEach(c=>c.style.background=W_CLOUD['sunny']);
render();
</script>
</body>
